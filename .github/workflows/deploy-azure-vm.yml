name: Deploy to Azure VM

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-azure-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/suna-bim-agent-backend
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/suna-bim-agent-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_ENV_MODE=production
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=https://carbon-bim.ensimu.space/api
            NEXT_PUBLIC_URL=https://carbon-bim.ensimu.space
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to Azure VM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          BRANCH: ${{ github.ref_name }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MCP_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.MCP_CREDENTIAL_ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/suna-bim-agent-backend
          FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/suna-bim-agent-frontend
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 30m
          debug: false
          envs: BRANCH,DATABASE_URL,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,SUPABASE_ANON_KEY,SUPABASE_JWT_SECRET,ENCRYPTION_KEY,MCP_CREDENTIAL_ENCRYPTION_KEY,ANTHROPIC_API_KEY,OPENAI_API_KEY,GH_MODELS_TOKEN,E2B_API_KEY,TAVILY_API_KEY,FIRECRAWL_API_KEY,GHCR_TOKEN,GHCR_USERNAME,IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            set -e
            # Add nvm and pnpm to PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            echo "🚀 Deploying to Azure VM..."

            cd ~/suna-bim-agent

            echo "📥 Pulling latest code..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "🔐 Updating environment variables..."
            cd backend
            cat > .env <<EOF
            SUPABASE_URL=${SUPABASE_URL}
            SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
            SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
            DATABASE_URL=${DATABASE_URL}
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            MCP_CREDENTIAL_ENCRYPTION_KEY=${MCP_CREDENTIAL_ENCRYPTION_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            GH_MODELS_TOKEN=${GH_MODELS_TOKEN}
            E2B_API_KEY=${E2B_API_KEY}
            TAVILY_API_KEY=${TAVILY_API_KEY}
            FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_SSL=False
            ENV_MODE=production
            MAIN_LLM=github
            MAIN_LLM_MODEL=github/gpt-4o
            EOF
            cd ..

            echo "🔄 Restarting services..."
            export IMAGE_TAG="${IMAGE_TAG}"
            export BACKEND_IMAGE="${BACKEND_IMAGE}"
            export FRONTEND_IMAGE="${FRONTEND_IMAGE}"

            if [ -n "${GHCR_TOKEN}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi

            # Use production compose with Traefik
            if [ -f "docker-compose.prod.yaml" ]; then
              docker compose -f docker-compose.prod.yaml pull
              docker compose -f docker-compose.prod.yaml down --remove-orphans || true
              docker compose -f docker-compose.prod.yaml up -d
              docker image prune -af --filter "until=24h" || true
            elif [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
              docker compose pull
              docker compose down --remove-orphans || true
              docker compose up -d
              docker image prune -af --filter "until=24h" || true
            fi

            echo "✅ Deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            echo "🔍 Verifying deployment..."
            cd ~/suna-bim-agent
            docker compose -f docker-compose.prod.yaml ps || docker compose ps || true
            curl -sf http://localhost:3000 > /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend check failed"
            curl -sf http://localhost:8000/v1/health > /dev/null && echo "✅ Backend OK" || echo "⚠️ Backend check failed"
