name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build + push backend Docker image to Cloudflare Image Registry
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend Container
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Cloudflare Image Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cloudflare.com
          username: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          password: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: meta
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            registry.cloudflare.com/5adf62efd6cf179a8939c211b155e229/carbon-bim-backend:latest
            registry.cloudflare.com/5adf62efd6cf179a8939c211b155e229/carbon-bim-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Deploy backend Worker + Container via Wrangler
  # ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend Worker
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set backend secrets
        working-directory: cloudflare
        run: |
          echo "${{ secrets.SUPABASE_URL }}" | wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_ANON_KEY }}" | wrangler secret put SUPABASE_ANON_KEY
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          echo "${{ secrets.SUPABASE_JWT_SECRET }}" | wrangler secret put SUPABASE_JWT_SECRET
          echo "${{ secrets.REDIS_HOST }}" | wrangler secret put REDIS_HOST
          echo "${{ secrets.REDIS_PORT }}" | wrangler secret put REDIS_PORT
          echo "${{ secrets.REDIS_PASSWORD }}" | wrangler secret put REDIS_PASSWORD
          echo "default" | wrangler secret put REDIS_USERNAME
          echo "true" | wrangler secret put REDIS_SSL
          echo "${{ secrets.E2B_API_KEY }}" | wrangler secret put E2B_API_KEY
          echo "${{ secrets.TAVILY_API_KEY }}" | wrangler secret put TAVILY_API_KEY
          echo "${{ secrets.FIRECRAWL_API_KEY }}" | wrangler secret put FIRECRAWL_API_KEY

      - name: Deploy Worker
        working-directory: cloudflare
        run: wrangler deploy

  # ──────────────────────────────────────────────────────────────
  # Deploy frontend to Cloudflare Pages
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Cloudflare Pages
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
          NEXT_PUBLIC_ENV_MODE: production
        run: |
          pnpm exec next-on-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=carbon-bim --commit-dirty=true
          workingDirectory: apps/frontend
