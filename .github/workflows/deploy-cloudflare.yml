name: Deploy to Cloudflare (Disabled)

# DISABLED - Using Azure VM deployment instead
# Cloudflare is only used for custom domain DNS routing
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Cloudflare deployment disabled
        run: |
          echo "Cloudflare deployment is disabled."
          echo "Using Azure VM deployment with Cloudflare DNS routing only."
          echo "Custom domain: carbon-bim.ensimu.space → Azure VM"
          exit 1
