name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag override (default: git SHA)'
        required: false
        default: ''

concurrency:
  group: deploy-aca-${{ github.ref_name }}
  cancel-in-progress: false

env:
  RESOURCE_GROUP:   carbon-bim-rg
  ACA_ENV:          carbon-bim-env
  ACR_SERVER:       ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_URL:      https://carbon-bim-backend.bluesand-d188d0a3.southeastasia.azurecontainerapps.io
  FRONTEND_URL:     https://carbon-bim-frontend.bluesand-d188d0a3.southeastasia.azurecontainerapps.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build & Push — uses ACR admin creds directly, no Azure SP needed
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag:      ${{ steps.tag.outputs.tag }}
      backend_image:  ${{ steps.tag.outputs.backend_image }}
      frontend_image: ${{ steps.tag.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          [[ -z "$TAG" ]] && TAG="${GITHUB_SHA::12}"
          ACR="${{ secrets.ACR_NAME }}.azurecr.io"
          echo "tag=$TAG"                                          >> "$GITHUB_OUTPUT"
          echo "backend_image=${ACR}/carbon-bim-backend:${TAG}"   >> "$GITHUB_OUTPUT"
          echo "frontend_image=${ACR}/carbon-bim-frontend:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.backend_image }}
            ${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:latest
            ghcr.io/${{ github.repository_owner }}/suna-bim-agent-backend:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/suna-bim-agent-backend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:cache
          cache-to:   type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:cache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.frontend_image }}
            ${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:latest
            ghcr.io/${{ github.repository_owner }}/suna-bim-agent-frontend:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/suna-bim-agent-frontend:latest
          build-args: |
            NEXT_PUBLIC_ENV_MODE=production
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ env.BACKEND_URL }}/v1
            NEXT_PUBLIC_URL=${{ env.FRONTEND_URL }}
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:cache
          cache-to:   type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:cache,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 2. E2E Tests — run Playwright against Next.js dev server
  #    Blocks deploy on failure. Set E2E_TEST_EMAIL secret for auth smoke test.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/frontend
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BACKEND_URL:       ${{ env.BACKEND_URL }}/v1
          NEXT_PUBLIC_URL:               http://localhost:3000
        run: pnpm test:e2e --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy — SSH into Azure VM to run `az containerapp update`
  #    (VM already has az CLI authenticated — no service principal needed)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ACA via VM
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.AZURE_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to ACA + restart prod stack
        env:
          TAG:              ${{ needs.build.outputs.image_tag }}
          BACKEND_IMAGE:    ${{ needs.build.outputs.backend_image }}
          FRONTEND_IMAGE:   ${{ needs.build.outputs.frontend_image }}
          RESOURCE_GROUP:   ${{ env.RESOURCE_GROUP }}
          ACA_ENV:          ${{ env.ACA_ENV }}
          ACR_SERVER:       ${{ env.ACR_SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              "${{ secrets.AZURE_VM_USERNAME }}@${{ secrets.AZURE_VM_HOST }}" \
              "bash -s" << 'ENDSSH'
            set -euo pipefail

            echo "=== ACA: update backend ==="
            az login --identity --allow-no-subscriptions --only-show-errors >/dev/null
            az containerapp update \
              --resource-group "$RESOURCE_GROUP" \
              --name carbon-bim-backend \
              --image "$BACKEND_IMAGE" \
              --only-show-errors

            echo "=== ACA: update frontend ==="
            az containerapp update \
              --resource-group "$RESOURCE_GROUP" \
              --name carbon-bim-frontend \
              --image "$FRONTEND_IMAGE" \
              --only-show-errors

            echo "=== VM prod stack: pull + restart ==="
            REPO_DIR="$(find /home /root /srv -maxdepth 3 -name 'docker-compose.prod.yaml' 2>/dev/null | head -1 | xargs dirname)"
            if [[ -n "$REPO_DIR" ]]; then
              cd "$REPO_DIR"
              git pull --ff-only origin main 2>/dev/null || true
              IMAGE_TAG="$TAG" docker compose -f docker-compose.prod.yaml pull --quiet
              IMAGE_TAG="$TAG" docker compose -f docker-compose.prod.yaml up -d --remove-orphans
              echo "VM prod stack restarted at $REPO_DIR"
            else
              echo "WARNING: docker-compose.prod.yaml not found on VM — skipping prod stack restart"
            fi
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting 30s for containers to restart..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -sf --max-time 10 "${{ env.BACKEND_URL }}/v1/health" \
              -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            echo "  HTTP $STATUS (attempt $i/10)"
            [[ "$STATUS" == "200" ]] && echo "✅ Backend healthy!" && exit 0
            sleep 15
          done
          echo "⚠️ Health check timed out — check ACA logs"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment — \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | [${{ env.FRONTEND_URL }}](${{ env.FRONTEND_URL }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Backend**  | [${{ env.BACKEND_URL }}/v1](${{ env.BACKEND_URL }}/v1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image tag** | \`${{ needs.build.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
