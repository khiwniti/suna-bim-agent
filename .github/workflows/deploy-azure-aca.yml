name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag override (default: git SHA)'
        required: false
        default: ''

concurrency:
  group: deploy-aca-${{ github.ref_name }}
  cancel-in-progress: false

env:
  RESOURCE_GROUP:   carbon-bim-rg
  ACA_ENV:          carbon-bim-env
  ACR_SERVER:       ${{ secrets.ACR_NAME }}.azurecr.io
  BACKEND_URL:      https://carbon-bim-backend.bluesand-d188d0a3.southeastasia.azurecontainerapps.io
  FRONTEND_URL:     https://carbon-bim-frontend.bluesand-d188d0a3.southeastasia.azurecontainerapps.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build & Push — uses ACR admin creds directly, no Azure SP needed
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag:      ${{ steps.tag.outputs.tag }}
      backend_image:  ${{ steps.tag.outputs.backend_image }}
      frontend_image: ${{ steps.tag.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          [[ -z "$TAG" ]] && TAG="${GITHUB_SHA::12}"
          ACR="${{ secrets.ACR_NAME }}.azurecr.io"
          echo "tag=$TAG"                                          >> "$GITHUB_OUTPUT"
          echo "backend_image=${ACR}/carbon-bim-backend:${TAG}"   >> "$GITHUB_OUTPUT"
          echo "frontend_image=${ACR}/carbon-bim-frontend:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.backend_image }}
            ${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:latest
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:cache
          cache-to:   type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-backend:cache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.frontend_image }}
            ${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:latest
          build-args: |
            NEXT_PUBLIC_ENV_MODE=production
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ env.BACKEND_URL }}/v1
            NEXT_PUBLIC_URL=${{ env.FRONTEND_URL }}
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:cache
          cache-to:   type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/carbon-bim-frontend:cache,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Deploy — SSH into Azure VM to run `az containerapp update`
  #    (VM already has az CLI authenticated — no service principal needed)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ACA via VM
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Deploy via SSH to Azure VM
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE:  ${{ needs.build.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          IMAGE_TAG:      ${{ needs.build.outputs.image_tag }}
          RESOURCE_GROUP: carbon-bim-rg
          ACR_USERNAME:   ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD:   ${{ secrets.ACR_PASSWORD }}
          ACR_SERVER:     ${{ secrets.ACR_NAME }}.azurecr.io
        with:
          host:            ${{ secrets.AZURE_VM_HOST }}
          username:        ${{ secrets.AZURE_VM_USERNAME }}
          key:             ${{ secrets.AZURE_VM_SSH_KEY }}
          port:            22
          timeout:         120s
          command_timeout: 15m
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,IMAGE_TAG,RESOURCE_GROUP,ACR_USERNAME,ACR_PASSWORD,ACR_SERVER
          script: |
            set -e

            # Install az CLI if missing
            if ! command -v az &>/dev/null; then
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            fi

            # Login using the VM's System-Assigned Managed Identity (no credentials needed)
            az login --identity --output none
            az extension add --name containerapp --upgrade --only-show-errors 2>/dev/null || true

            # Log in to ACR
            echo "${ACR_PASSWORD}" | docker login "${ACR_SERVER}" -u "${ACR_USERNAME}" --password-stdin 2>/dev/null || true

            echo "🔄 Updating backend → ${BACKEND_IMAGE}"
            az containerapp update \
              --name carbon-bim-backend \
              --resource-group "${RESOURCE_GROUP}" \
              --image "${BACKEND_IMAGE}" \
              --output none

            echo "🔄 Updating frontend → ${FRONTEND_IMAGE}"
            az containerapp update \
              --name carbon-bim-frontend \
              --resource-group "${RESOURCE_GROUP}" \
              --image "${FRONTEND_IMAGE}" \
              --output none

            echo "✅ ACA update complete (tag: ${IMAGE_TAG})"

      - name: Health check
        run: |
          echo "Waiting 30s for containers to restart..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -sf --max-time 10 "${{ env.BACKEND_URL }}/v1/health" \
              -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            echo "  HTTP $STATUS (attempt $i/10)"
            [[ "$STATUS" == "200" ]] && echo "✅ Backend healthy!" && exit 0
            sleep 15
          done
          echo "⚠️ Health check timed out — check ACA logs"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deployment — \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | [${{ env.FRONTEND_URL }}](${{ env.FRONTEND_URL }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Backend**  | [${{ env.BACKEND_URL }}/v1](${{ env.BACKEND_URL }}/v1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image tag** | \`${{ needs.build.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
