name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - apps/frontend/**
      - backend/**
      - packages/**
      - docker-compose.dokploy.yml
      - .env.dokploy
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to 20.55.21.69
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd /home/khiwniti/suna-bim-agent

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building changed services..."
            docker compose -f docker-compose.dokploy.yml --env-file .env build --no-cache

            echo "==> Restarting services..."
            docker compose -f docker-compose.dokploy.yml --env-file .env up -d --force-recreate

            echo "==> Waiting for health checks..."
            sleep 30
            docker ps --format "table {{.Names}}\t{{.Status}}"

            echo "==> Deployment complete!"
